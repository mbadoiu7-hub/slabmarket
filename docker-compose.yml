version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: slabmarket-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: slabmarket
      POSTGRES_PASSWORD: slabmarket
      POSTGRES_DB: slabmarket
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slabmarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: slabmarket-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slabmarket-app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npx prisma db push && npx prisma db seed && npm run dev"

volumes:
  pgdata:
